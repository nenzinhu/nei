<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a1a"/>
  
  <defs>
    <linearGradient id="carRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="windowBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4db8ff"/>
      <stop offset="100%" stop-color="#008ae6"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Labels -->
  <text x="350" y="380" fill="white" font-family="Times New Roman, serif" font-size="42" font-weight="bold">ANIMAL</text>
  <text x="560" y="380" fill="white" font-family="Times New Roman, serif" font-size="42" font-weight="bold">V1</text>

  <!-- Road -->
  <g transform="translate(150, 450)">
    <rect width="1300" height="300" rx="20" fill="#333333"/>
    <rect width="1300" height="8" fill="white"/>
    <rect y="292" width="1300" height="8" fill="white"/>
    <line x1="0" y1="150" x2="1300" y2="150" stroke="#f1c40f" stroke-width="8" stroke-dasharray="60 40"/>
  </g>

  <!-- Animal (Illustration style) -->
  <g transform="translate(410, 560)" filter="url(#dropShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="60" ry="35" fill="#a67c52"/>
    <!-- Head -->
    <circle cx="55" cy="-20" r="22" fill="#a67c52"/>
    <!-- Ears -->
    <path d="M45 -38 L 50 -55 L 60 -40" fill="#a67c52"/>
    <path d="M65 -38 L 70 -55 L 80 -40" fill="#a67c52"/>
    <!-- Legs -->
    <rect x="-40" y="25" width="12" height="45" rx="5" fill="#8b6239"/>
    <rect x="-10" y="25" width="12" height="45" rx="5" fill="#8b6239"/>
    <rect x="25" y="25" width="12" height="45" rx="5" fill="#8b6239"/>
    <!-- Tail -->
    <path d="M-60 0 Q -85 -20, -80 10" fill="none" stroke="#8b6239" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Vehicle V1 -->
  <g transform="translate(520, 410)" filter="url(#dropShadow)">
    <path d="M0 40 L 160 40 L 160 80 Q 160 100 140 100 L 20 100 Q 0 100 0 80 Z" fill="url(#carRed)"/>
    <path d="M20 40 L 40 0 L 120 0 L 150 40 Z" fill="url(#carRed)"/>
    <path d="M45 10 L 115 10 L 135 40 L 30 40 Z" fill="url(#windowBlue)" opacity="0.8"/>
    <circle cx="35" cy="100" r="22" fill="#2c1a3d"/>
    <circle cx="35" cy="100" r="10" fill="#4c3b5c"/>
    <circle cx="125" cy="100" r="22" fill="#2c1a3d"/>
    <circle cx="125" cy="100" r="10" fill="#4c3b5c"/>
    <rect x="-2" y="55" width="10" height="15" rx="5" fill="#ffff99"/>
  </g>

  <!-- Description Footer -->
  <rect x="150" y="780" width="1300" height="80" rx="15" fill="rgba(255,255,255,0.05)"/>
  <text x="800" y="830" text-anchor="middle" fill="#cccccc" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    1.2 · ATROPELAMENTO DE ANIMAL
  </text>

</svg>