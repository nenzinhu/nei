<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a1a"/>
  
  <defs>
    <linearGradient id="carRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="carAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#e68a00"/>
    </linearGradient>
    <linearGradient id="windowBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4db8ff"/>
      <stop offset="100%" stop-color="#008ae6"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Labels -->
  <text x="640" y="380" fill="white" font-family="Times New Roman, serif" font-size="42" font-weight="bold">V1</text>
  <text x="820" y="660" fill="white" font-family="Times New Roman, serif" font-size="42" font-weight="bold">V2</text>

  <!-- Intersection Road -->
  <g transform="translate(150, 350)">
    <!-- Horizontal Road -->
    <rect width="1300" height="250" rx="10" fill="#333333"/>
    <rect width="1300" height="8" fill="white"/>
    <rect y="242" width="1300" height="8" fill="white"/>
    <!-- Vertical Road (Intersection) -->
    <rect x="700" y="250" width="250" height="300" fill="#333333"/>
    <rect x="700" y="250" width="8" height="300" fill="white"/>
    <rect x="942" y="250" width="8" height="300" fill="white"/>
    <!-- Dashed Lines -->
    <line x1="0" y1="125" x2="700" y2="125" stroke="#f1c40f" stroke-width="8" stroke-dasharray="60 40"/>
    <line x1="950" y1="125" x2="1300" y2="125" stroke="#f1c40f" stroke-width="8" stroke-dasharray="60 40"/>
    <line x1="825" y1="350" x2="825" y2="550" stroke="#f1c40f" stroke-width="8" stroke-dasharray="60 40"/>
  </g>

  <!-- Vehicle V1 (Horizontal) -->
  <g transform="translate(680, 420)" filter="url(#dropShadow)">
    <path d="M0 40 L 160 40 L 160 80 Q 160 100 140 100 L 20 100 Q 0 100 0 80 Z" fill="url(#carRed)"/>
    <path d="M20 40 L 40 0 L 120 0 L 150 40 Z" fill="url(#carRed)"/>
    <path d="M45 10 L 115 10 L 135 40 L 30 40 Z" fill="url(#windowBlue)" opacity="0.8"/>
    <circle cx="35" cy="100" r="22" fill="#2c1a3d"/>
    <circle cx="35" cy="100" r="10" fill="#4c3b5c"/>
    <circle cx="125" cy="100" r="22" fill="#2c1a3d"/>
    <circle cx="125" cy="100" r="10" fill="#4c3b5c"/>
  </g>

  <!-- Vehicle V2 (Vertical - Top view rotated or side view coming up) -->
  <!-- We'll use the same side view but rotated 90deg -->
  <g transform="translate(875, 550) rotate(-90)" filter="url(#dropShadow)">
    <path d="M0 40 L 160 40 L 160 80 Q 160 100 140 100 L 20 100 Q 0 100 0 80 Z" fill="url(#carAmber)"/>
    <path d="M20 40 L 40 0 L 120 0 L 150 40 Z" fill="url(#carAmber)"/>
    <path d="M45 10 L 115 10 L 135 40 L 30 40 Z" fill="url(#windowBlue)" opacity="0.8"/>
    <circle cx="35" cy="100" r="22" fill="#2c1a3d"/>
    <circle cx="35" cy="100" r="10" fill="#4c3b5c"/>
    <circle cx="125" cy="100" r="22" fill="#2c1a3d"/>
    <circle cx="125" cy="100" r="10" fill="#4c3b5c"/>
  </g>

  <!-- Impact Symbol -->
  <g transform="translate(800, 480)">
    <path d="M-40 -40 L 40 40 M-40 40 L 40 -40" stroke="#ff0000" stroke-width="15" stroke-linecap="round" opacity="0.9"/>
    <circle r="20" fill="#ff0000" opacity="0.6"/>
  </g>

  <!-- Description Footer -->
  <rect x="150" y="780" width="1300" height="80" rx="15" fill="rgba(255,255,255,0.05)"/>
  <text x="800" y="830" text-anchor="middle" fill="#cccccc" font-family="Arial, sans-serif" font-size="28" font-weight="bold">
    2.3 · ABALROAMENTO TRANSVERSAL
  </text>

</svg>